<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>IE v6.2.1 — Signal Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;600;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #05050f;
    --bg2:       #08081a;
    --bg3:       #0c0c22;
    --border:    #1a1a40;
    --border2:   #2a2a60;
    --calls:     #00e676;
    --calls-dim: #004d26;
    --puts:      #ff1744;
    --puts-dim:  #4d0010;
    --gold:      #ffd700;
    --orange:    #ff9800;
    --cyan:      #00e5ff;
    --purple:    #ce93d8;
    --gray:      #444466;
    --text:      #c8c8e8;
    --text-dim:  #666688;
  }

  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: 'Space Mono', monospace; overflow: hidden;
    display: flex; flex-direction: column; height: 100vh;
  }

  /* Header */
  header {
    height: 60px; background: var(--bg2); border-bottom: 2px solid var(--border);
    display: flex; align-items: center; padding: 0 24px; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); z-index: 100;
  }
  .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.4rem; color: var(--cyan); letter-spacing: 2px; }
  .status-tag { font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; padding: 4px 10px; border-radius: 4px; background: #111; border: 1px solid var(--border); }
  .status-tag.online { color: var(--calls); border-color: var(--calls-dim); }

  /* Main Layout */
  .main-container { display: flex; flex: 1; overflow: hidden; }

  /* Sidebar Stats */
  .sidebar {
    width: 300px; background: var(--bg2); border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow-y: auto; padding: 20px;
  }
  .stat-card {
    background: var(--bg3); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 15px;
  }
  .stat-label { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 5px; }
  .stat-val { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--text); }

  /* Feed Area */
  .feed-container { flex: 1; display: flex; flex-direction: column; background: var(--bg); }
  
  .filter-bar {
    padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; overflow-x: auto; background: var(--bg2);
  }
  .filter-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    padding: 6px 12px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; white-space: nowrap; transition: 0.2s;
  }
  .filter-btn:hover { border-color: var(--cyan); color: var(--text); }
  .filter-btn.active { background: var(--cyan); color: var(--bg); border-color: var(--cyan); font-weight: 700; }

  .scroll-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }

  /* Alert Cards */
  .alert-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 8px;
    display: flex; position: relative; transition: 0.2s; cursor: pointer;
    animation: slideIn 0.3s ease-out;
  }
  .alert-card:hover { border-color: var(--border2); transform: translateX(4px); background: var(--bg3); }
  .alert-card.selected { border-color: var(--cyan); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
  .card-stripe { width: 6px; border-radius: 8px 0 0 8px; background: var(--gray); }
  .alert-card.dir-CALLS .card-stripe { background: var(--calls); }
  .alert-card.dir-PUTS .card-stripe { background: var(--puts); }
  .alert-card.sig-T3_HIT .card-stripe { background: var(--gold); }
  .alert-card.sig-OB_CLEAR .card-stripe { background: var(--cyan); }

  .card-body { flex: 1; padding: 12px 16px; display: flex; flex-direction: column; gap: 6px; }
  .card-top { display: flex; align-items: center; gap: 10px; }
  .ticker-badge { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1rem; color: #fff; }
  .tf-tag { background: #1a1a3a; color: var(--cyan); padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: 700; }
  .type-tag { font-size: 0.7rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; }

  /* Type Styles */
  .type-ENTRY_CALLS { background: var(--calls-dim); color: var(--calls); }
  .type-ENTRY_PUTS { background: var(--puts-dim); color: var(--puts); }
  .type-T3_HIT { background: rgba(255,215,0,0.1); color: var(--gold); border: 1px solid var(--gold); }
  .type-GAP_EXIT { background: rgba(255,152,0,0.15); color: var(--orange); border: 1px solid var(--orange); }
  .type-OB_CLEAR { background: rgba(0, 229, 255, 0.12); color: var(--cyan); border: 1px solid var(--cyan); }

  .card-verdict { font-size: 0.85rem; line-height: 1.4; color: var(--text); }
  .card-levels { display: flex; gap: 15px; margin-top: 4px; font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; }
  .level-item { display: flex; flex-direction: column; }
  .lv-label { font-size: 0.6rem; color: var(--text-dim); }
  .lv-val { color: var(--text); }
  .card-footer { display: flex; justify-content: flex-end; font-size: 0.65rem; color: var(--text-dim); margin-top: 4px; }

  /* Ticker Grid Heatmap */
  .ticker-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
  .ticker-cell { 
    background: #111; border: 1px solid var(--border); padding: 8px 2px; text-align: center; 
    font-size: 0.65rem; border-radius: 4px; font-weight: 700; color: var(--text-dim);
  }
  .ticker-cell.has-calls { background: var(--calls-dim); color: var(--calls); border-color: var(--calls); }
  .ticker-cell.has-puts { background: var(--puts-dim); color: var(--puts); border-color: var(--puts); }

  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* Right Panel: Details */
  .details-panel { width: 340px; background: var(--bg2); border-left: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .detail-section { background: var(--bg3); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }
  .detail-field { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1a1a40; font-size: 0.75rem; }
  .df-label { color: var(--text-dim); }
  .df-val { color: var(--text); font-family: 'Share Tech Mono', monospace; }
  .raw-msg { font-size: 0.7rem; background: #000; padding: 12px; border-radius: 4px; border: 1px solid var(--border); color: #0f0; white-space: pre-wrap; overflow-x: auto; }

  /* Toasts */
  #toast {
    position: fixed; bottom: 30px; right: 30px; background: var(--bg3); border: 2px solid var(--cyan);
    padding: 16px 24px; border-radius: 8px; display: none; z-index: 1000; box-shadow: 0 10px 40px rgba(0,0,0,0.8);
    min-width: 300px;
  }
  #toast.show { display: block; animation: toastIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
  @keyframes toastIn { from { opacity:0; transform: translateY(100px); } to { opacity:1; transform: translateY(0); } }

  .sound-btn { background: #1a1a3a; color: var(--cyan); border: 1px solid var(--cyan); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 700; }
  .sound-btn.on { background: var(--cyan); color: #000; }
</style>
</head>
<body>

<header>
  <div class="logo">IE v6.2.1 <span style="font-size:0.6rem; color:var(--text-dim); vertical-align:middle">ALPHA TERMINAL</span></div>
  <div style="display:flex; align-items:center; gap:20px">
    <button id="soundBtn" class="sound-btn" onclick="toggleSound()">🔇 SOUND</button>
    <div id="status" class="status-tag">CONNECTING...</div>
  </div>
</header>

<div class="main-container">
  <div class="sidebar">
    <div class="stat-card">
      <div class="stat-label">TOTAL ALERTS</div>
      <div id="statTotal" class="stat-val">0</div>
    </div>
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
      <div class="stat-card">
        <div class="stat-label">CALLS</div>
        <div id="statCalls" class="stat-val" style="color:var(--calls)">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PUTS</div>
        <div id="statPuts" class="stat-val" style="color:var(--puts)">0</div>
      </div>
    </div>
    <div class="stat-card">
      <div class="stat-label">T3 PROFIT HITS</div>
      <div id="statT3" class="stat-val" style="color:var(--gold)">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">GAP EVENTS</div>
      <div id="statGap" class="stat-val" style="color:var(--orange)">0</div>
    </div>
    <div class="stat-card">
        <div class="stat-label">LATEST SIGNAL</div>
        <div id="statLast" class="stat-val" style="font-size:0.8rem; color:var(--cyan)">WAITING...</div>
    </div>

    <div class="stat-label" style="margin-top:10px">TICKER MONITOR</div>
    <div id="tickerGrid" class="ticker-grid"></div>
    
    <button onclick="clearAlerts()" style="margin-top:auto; padding:10px; background:var(--puts-dim); color:var(--puts); border:1px solid var(--puts); cursor:pointer; font-weight:700; border-radius:4px">CLEAR ALL</button>
    <button onclick="sendTestAlert()" style="margin-top:10px; padding:8px; background:#111; color:var(--text-dim); border:1px solid var(--border); cursor:pointer; font-size:0.7rem; border-radius:4px">SEND TEST ALERT</button>
  </div>

  <div class="feed-container">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="setFilter('ALL',this)">ALL</button>
      <button class="filter-btn" onclick="setFilter('ENTRY',this)">ENTRIES</button>
      <button class="filter-btn" onclick="setFilter('EXIT',this)">EXITS</button>
      <button class="filter-btn" onclick="setFilter('GAP',this)">GAPS</button>
      <button class="filter-btn" onclick="setFilter('OB_CLEAR',this)">🧱 OB CLEAR</button>
      <button class="filter-btn" onclick="setFilter('PATTERN',this)">PATTERNS</button>
      <button class="filter-btn" onclick="setFilter('LIQ',this)">LIQUIDITY</button>
    </div>
    <div id="scrollArea" class="scroll-area"></div>
  </div>

  <div class="details-panel">
    <div class="stat-label">SIGNAL DATA</div>
    <div id="detailPanel" class="detail-section">
      <div style="text-align:center; color:var(--text-dim); padding:40px 0; font-size:0.8rem">SELECT A SIGNAL</div>
    </div>
    <div class="stat-label">RAW MESSAGE</div>
    <div id="rawMsg" class="raw-msg">...</div>
  </div>
</div>

<div id="toast">
  <div style="font-family:'Orbitron'; font-weight:900; font-size:1.1rem; margin-bottom:4px" id="toastTicker">--</div>
  <div style="font-size:0.85rem; line-height:1.4" id="toastBody">--</div>
</div>

<script>
let allAlerts = [];
let currentFilter = 'ALL';
let selectedId = null;
let soundEnabled = false;

const TICKERS = ['SPY','QQQ','NDX','NVDA','TSLA','META','AAPL','AMD','MSFT','GOOGL','NFLX','AMZN','PYPL','COIN','BABA','BA','RIVN','PLTR','MARA','MSTR'];

// ── SSE Connection ─────────────────────────────────────────────
function initSSE() {
  const statusEl = document.getElementById('status');
  const evtSource = new EventSource('/stream');

  evtSource.onopen = () => {
    statusEl.textContent = 'ONLINE';
    statusEl.className = 'status-tag online';
  };

  evtSource.onerror = () => {
    statusEl.textContent = 'RECONNECTING...';
    statusEl.className = 'status-tag';
    setTimeout(initSSE, 3000);
    evtSource.close();
  };

  evtSource.addEventListener('init', (e) => {
    allAlerts = JSON.parse(e.data);
    renderFeed();
    updateStats();
    updateTickerGrid();
  });

  evtSource.addEventListener('alert', (e) => {
    const a = parseAlert(e.data);
    allAlerts.unshift(a);
    if (allAlerts.length > 200) allAlerts.pop();
    renderFeed();
    updateStats();
    updateTickerGrid();
    showToast(a);
    playSound(a);
  });

  evtSource.addEventListener('clear', () => {
    allAlerts = [];
    renderFeed();
    updateStats();
    updateTickerGrid();
  });
}

initSSE();

// ── Parsing ───────────────────────────────────────────────────
function parseAlert(r) {
  // NEW: OB Broken / Cleared Logic
  if (/OB BROKEN|OB CLEARED|OB VIOLATED/i.test(r)) {
    const ticker = (r.match(/TICKER:([A-Z0-9]+)/) || [])[1] || '';
    const tf = (r.match(/\[(\d+m)\]/) || [])[1] || '—';
    const isBearishOB = /Bearish OB/i.test(r); 
    
    return {
      id: Date.now(),
      timestamp: new Date().toISOString(),
      type: 'OB_CLEAR',
      signal: isBearishOB ? 'CALLS' : 'PUTS', // Bearish OB broken = Bullish shift
      ticker: ticker,
      timeframe: tf,
      verdict: isBearishOB ? `🚀 RESISTANCE CLEARED — Bearish OB Broken` : `📉 SUPPORT CLEARED — Bullish OB Broken`,
      raw: r
    };
  }

  const ticker = (r.match(/TICKER:([A-Z0-9]+)/) || [])[1] || '—';
  const tf     = (r.match(/\[TF: (.*?)\]|\[(\d+m)\]/) || []).find(m=>m && m.includes('m')) || '—';
  const score  = (r.match(/Score: (\d+)\/10/) || [])[1];
  const dte    = (r.match(/\[(\d+DTE)\]/) || [])[1];
  const htf    = r.includes('HTF✅') ? '✅' : r.includes('HTF❌') ? '❌' : null;
  const entry  = (r.match(/Entry\s*:\s*([\d.]+)|Entry zone:\s*([\d.-]+)/) || []).find(m=>m && !m.includes('Entry'));
  const sl     = (r.match(/SL\s*:\s*([\d.]+)/) || [])[1];
  const t1     = (r.match(/T1\s*:\s*([\d.]+)/) || [])[1];
  const t2     = (r.match(/T2\s*:\s*([\d.]+)/) || [])[1];
  const t3     = (r.match(/T3\s*:\s*([\d.]+)/) || [])[1];
  const quality= (r.match(/Quality:\s*(.*)/) || [])[1];

  let type = 'INFO', signal = 'NEUTRAL', verdict = r.split('\n')[0];

  if (r.includes('ENTER CALLS')) { type='ENTRY_CALLS'; signal='CALLS'; }
  else if (r.includes('ENTER PUTS')) { type='ENTRY_PUTS'; signal='PUTS'; }
  else if (r.includes('T1 HIT')) { type='T1_HIT'; }
  else if (r.includes('T2 HIT')) { type='T2_HIT'; }
  else if (r.includes('T3 HIT')) { type='T3_HIT'; }
  else if (r.includes('STOPPED')) { type='STOPPED'; signal='PUTS'; }
  else if (r.includes('BULL LIQ')) { type='LIQ_BULL'; signal='CALLS'; }
  else if (r.includes('BEAR LIQ')) { type='LIQ_BEAR'; signal='PUTS'; }
  else if (r.includes('GAP EXIT')) { 
    type='GAP_EXIT'; 
    signal = r.includes('EXIT CALLS') ? 'CALLS' : 'PUTS'; 
  }
  else if (r.includes('GAP TRADE')) { 
    type='GAP_TRADE'; 
    signal = r.includes('CALLS') ? 'CALLS' : 'PUTS'; 
  }

  return { id: Date.now(), timestamp: new Date().toISOString(), type, signal, ticker, timeframe: tf, score, entry, sl, t1, t2, t3, quality, htf, dte, verdict, raw: r };
}

// ── Rendering ─────────────────────────────────────────────────
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderFeed();
}

function matchesFilter(a) {
  if (currentFilter === 'ALL') return true;
  if (currentFilter === 'ENTRY') return a.type.startsWith('ENTRY');
  if (currentFilter === 'EXIT') return a.type.includes('HIT') || a.type === 'STOPPED' || a.type === 'GAP_EXIT';
  if (currentFilter === 'GAP') return a.type.includes('GAP');
  if (currentFilter === 'OB_CLEAR') return a.type === 'OB_CLEAR';
  if (currentFilter === 'PATTERN') return ['TRIPLE_TOP','DOUBLE_TOP','TRIPLE_BOT','DOUBLE_BOT','FAILED_BOS','EMA_SQZ'].includes(a.type);
  if (currentFilter === 'LIQ') return a.type.includes('LIQ');
  return false;
}

function renderFeed() {
  const container = document.getElementById('scrollArea');
  container.innerHTML = allAlerts
    .filter(matchesFilter)
    .map(a => renderCard(a))
    .join('');
}

function renderCard(a) {
  const t = formatTime(a.timestamp);
  const sel = a.id === selectedId ? 'selected' : '';
  
  // Custom Render for GAP EXIT
  if (a.type==='GAP_EXIT') {
    const isCallsExit = a.signal==='CALLS';
    const ac = isCallsExit ? 'var(--puts)' : 'var(--calls)';
    const r = a.raw;
    const gapSz = (r.match(/Gap: ([\d.]+)/) || [])[1] || '—';
    const gapTp = (r.match(/\((.*?)\)/) || [])[1] || '—';
    const nextS = (r.match(/Watch for (.*?) setup/) || [])[1] || 'setup';
    
    return `<div class="alert-card sig-GAP_EXIT dir-${a.signal} ${sel}" onclick="selectAlert(${a.id})" data-id="${a.id}">
      <div class="card-stripe"></div>
      <div class="card-body" style="padding:10px 14px 10px 0">
        <div class="card-top" style="margin-bottom:6px">
          <span class="ticker-badge" style="color:var(--orange)">${a.ticker}</span>
          <span class="tf-tag">${a.timeframe}</span>
          <span class="type-tag type-GAP_EXIT">🚨 GAP EXIT</span>
          <span class="ts" style="margin-left:auto">${t}</span>
        </div>
        <div style="font-family:'Share Tech Mono',monospace;font-size:0.72rem;line-height:2.1">
          <div style="display:grid;grid-template-columns:90px 1fr;gap:0 12px">
            <span style="color:var(--text-dim)">ACTION</span>
            <span style="color:${ac};font-weight:700">${isCallsExit?'EXIT CALLS NOW':'EXIT PUTS NOW'}</span>
            <span style="color:var(--text-dim)">GAP SIZE</span>
            <span style="color:var(--orange)">${gapSz} pts (${gapTp})</span>
            <span style="color:var(--text-dim)">NEXT SETUP</span>
            <span style="color:var(--text)">Watch for ${nextS}</span>
          </div>
        </div>
        <div class="card-footer"><span class="ts">${t}</span></div>
      </div>
    </div>`;
  }

  // Standard Render
  const lvls=[];
  if(a.entry) lvls.push(`<span class="level-item lv-entry"><span class="lv-label">ENTRY</span><span class="lv-val">${a.entry}</span></span>`);
  if(a.sl)    lvls.push(`<span class="level-item lv-sl"><span class="lv-label">SL</span><span class="lv-val">${a.sl}</span></span>`);
  if(a.t1)    lvls.push(`<span class="level-item lv-t1"><span class="lv-label">T1</span><span class="lv-val">${a.t1}</span></span>`);

  return `<div class="alert-card sig-${a.type} dir-${a.signal} ${sel}" onclick="selectAlert(${a.id})" data-id="${a.id}">
    <div class="card-stripe"></div>
    <div class="card-body">
      <div class="card-top">
        <span class="ticker-badge">${a.ticker}</span>
        ${a.timeframe!=='—'?`<span class="tf-tag">${a.timeframe}</span>`:''}
        <span class="type-tag type-${a.type}">${typeLabel(a.type)}</span>
        ${a.score?`<span style="font-size:0.65rem;color:var(--cyan);font-family:'Share Tech Mono',monospace">${a.score}/10</span>`:''}
      </div>
      <div class="card-verdict">${a.verdict}</div>
      ${lvls.length?`<div class="card-levels">${lvls.join('')}</div>`:''}
      <div class="card-footer"><span class="ts">${t}</span></div>
    </div>
  </div>`;
}

function typeLabel(t) {
  return {
    ENTRY_CALLS:'▲ ENTER CALLS',ENTRY_PUTS:'▼ ENTER PUTS',
    T1_HIT:'🎯 T1 HIT',T2_HIT:'🎯 T2 HIT',T3_HIT:'✅ T3 HIT',STOPPED:'🛑 STOPPED',
    LIQ_BULL:'💧 BULL LIQ',LIQ_BEAR:'💧 BEAR LIQ',
    GAP_EXIT:'🚨 GAP EXIT', GAP_TRADE:'⚡ GAP TRADE', OB_CLEAR:'🧱 OB CLEAR',
    INFO:'ℹ INFO'
  }[t]||t;
}

function formatTime(iso) {
  const et = new Date(new Date(iso).toLocaleString('en-US',{timeZone:'America/New_York'}));
  return et.toLocaleTimeString('en-US',{hour12:false});
}

// ── Select ────────────────────────────────────────────────────
function selectAlert(id) {
  selectedId = id;
  const a = allAlerts.find(x => x.id === id); if(!a) return;
  document.querySelectorAll('.alert-card').forEach(c => c.classList.remove('selected'));
  const card = document.querySelector(`[data-id="${id}"]`); if(card) card.classList.add('selected');

  document.getElementById('detailPanel').innerHTML = `
    <div class="detail-field"><span class="df-label">TICKER</span><span class="df-val">${a.ticker}</span></div>
    <div class="detail-field"><span class="df-label">TIMEFRAME</span><span class="df-val">${a.timeframe}</span></div>
    <div class="detail-field"><span class="df-label">TYPE</span><span class="df-val">${typeLabel(a.type)}</span></div>
    ${a.score?`<div class="detail-field"><span class="df-label">SCORE</span><span class="df-val">${a.score}/10</span></div>`:''}
    ${a.entry?`<div class="detail-field"><span class="df-label">ENTRY</span><span class="df-val">${a.entry}</span></div>`:''}
    ${a.sl?`<div class="detail-field df-puts"><span class="df-label">SL</span><span class="df-val">${a.sl}</span></div>`:''}
    ${a.t1?`<div class="detail-field df-gold"><span class="df-label">T1</span><span class="df-val">${a.t1}</span></div>`:''}
    <div class="detail-field"><span class="df-label">TIME (ET)</span><span class="df-val">${formatTime(a.timestamp)}</span></div>
  `;
  document.getElementById('rawMsg').textContent = a.raw || '—';
}

// ── Stats ─────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('statTotal').textContent = allAlerts.length;
  document.getElementById('statCalls').textContent = allAlerts.filter(a => a.type === 'ENTRY_CALLS').length;
  document.getElementById('statPuts').textContent = allAlerts.filter(a => a.type === 'ENTRY_PUTS').length;
  document.getElementById('statT3').textContent = allAlerts.filter(a => a.type === 'T3_HIT').length;
  document.getElementById('statGap').textContent = allAlerts.filter(a => ['GAP_TRADE','GAP_EXIT'].includes(a.type)).length;
  if(allAlerts.length) document.getElementById('statLast').textContent = `${allAlerts[0].ticker} ${formatTime(allAlerts[0].timestamp)}`;
}

function updateTickerGrid() {
  const recent = allAlerts.slice(0, 50);
  document.getElementById('tickerGrid').innerHTML = TICKERS.map(t => {
    const ta = recent.filter(a => a.ticker === t);
    const hasCalls = ta.some(a => a.signal === 'CALLS' && (a.type.includes('ENTRY') || a.type.includes('LIQ') || a.type === 'OB_CLEAR'));
    const hasPuts = ta.some(a => a.signal === 'PUTS' && (a.type.includes('ENTRY') || a.type.includes('LIQ') || a.type === 'OB_CLEAR'));
    const cls = hasCalls ? 'has-calls' : hasPuts ? 'has-puts' : '';
    return `<div class="ticker-cell ${cls}">${t}</div>`;
  }).join('');
}

// ── Feedback ──────────────────────────────────────────────────
function showToast(a) {
  const toast = document.getElementById('toast');
  document.getElementById('toastTicker').textContent = `${a.ticker}  ${a.timeframe}`;
  document.getElementById('toastBody').textContent = a.verdict;
  toast.className = 'show';
  setTimeout(() => { toast.className = ''; }, 5000);
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  document.getElementById('soundBtn').textContent = soundEnabled ? '🔊 SOUND' : '🔇 SOUND';
  document.getElementById('soundBtn').className = 'sound-btn' + (soundEnabled ? ' on' : '');
}

function playSound(a) {
  if(!soundEnabled) return;
  const ctx = new(window.AudioContext||window.webkitAudioContext)();
  const osc = ctx.createOscillator(), gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  const now = ctx.currentTime;
  if (a.type.includes('CALLS')) { osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1100, now+0.1); }
  else if (a.type.includes('PUTS')) { osc.frequency.setValueAtTime(660, now); osc.frequency.setValueAtTime(440, now+0.1); }
  else { osc.frequency.setValueAtTime(440, now); }
  gain.gain.setValueAtTime(0.1, now); gain.gain.exponentialRampToValueAtTime(0.001, now+0.3);
  osc.start(now); osc.stop(now+0.35);
}

async function sendTestAlert() {
  const message = `OB CLEARED — Bearish OB Broken [15m] | TICKER:NVDA\nResistance violated at 920.45. Bias shifting Bullish.`;
  await fetch('/webhook', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message, ticker: 'NVDA' }) });
}

async function clearAlerts() {
  if(!confirm('Clear all?')) return;
  await fetch('/alerts', { method: 'DELETE' });
}

updateTickerGrid();
</script>
